<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スマートデッキ 平面図作成ツール</title>
<link rel="icon" href="favicon.ico?v=3">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1b2a;--bg2:#152236;--bg3:#1c2e44;--text:#e8edf2;--text2:#8fa8c0;--border:#2a3f58;--accent:#3a8fd4}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;color:var(--text);background:var(--bg)}
.wrap{padding:1rem;max-width:900px;margin:0 auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.card{background:var(--bg2);border:.5px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:12px}
.sec-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.field label{font-size:12px;color:var(--text2)}
.field input,.field select{width:100%;height:36px;padding:0 10px;border:.5px solid var(--border);border-radius:6px;background:var(--bg3);color:var(--text);font-size:14px}
.field.hidden{display:none}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.metric{background:var(--bg2);border:.5px solid var(--border);border-radius:8px;padding:10px 12px}
.metric .lbl{font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.metric .val{font-size:20px;font-weight:600;color:var(--accent)}
.canvas-wrap{display:flex;justify-content:center;margin-bottom:12px;position:relative}
canvas{border:.5px solid var(--border);border-radius:8px;display:block;max-width:100%}
#cv{cursor:default}
#cv.grabbing{cursor:grabbing}
#cv.grab{cursor:grab}
#cv3{display:none;border:.5px solid var(--border);border-radius:8px}
.warn{font-size:13px;color:#e05555;margin-top:4px;margin-bottom:8px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:.5px solid var(--border)}
.top-bar img{height:28px;display:block}
.reset-btn{height:34px;padding:0 16px;border:.5px solid var(--border);border-radius:6px;background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer}
.reset-btn:hover{border-color:var(--accent);color:var(--accent)}
.view-toggle{display:flex;border:.5px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px}
.vbtn{flex:1;padding:8px;font-size:13px;font-weight:500;border:none;background:var(--bg3);color:var(--text2);cursor:pointer}
.vbtn.active{background:var(--accent);color:#fff}
.hint3d{position:absolute;top:8px;right:10px;font-size:11px;color:rgba(255,255,255,0.45);pointer-events:none;display:none;text-align:right;line-height:1.6}
.manual-badge{display:none;align-items:center;gap:10px;padding:8px 12px;background:rgba(224,120,32,0.15);border:.5px solid rgba(224,120,32,0.4);border-radius:6px;font-size:12px;color:#e07820;margin-bottom:8px}
.manual-badge.active{display:inline-flex}
.manual-badge button{background:none;border:none;color:#e07820;cursor:pointer;text-decoration:underline;font-size:12px;padding:0}
.side-menu{position:absolute;top:0;left:0;bottom:0;width:145px;background:rgba(10,20,35,0.92);border-right:0.5px solid rgba(255,255,255,0.12);border-radius:8px 0 0 8px;display:none;flex-direction:column;padding:10px 8px;gap:6px;overflow-y:auto}
.smtitle{font-size:11px;color:rgba(200,220,240,0.55);letter-spacing:.05em;padding:0 2px;margin-top:2px}
.car-btn{width:100%;padding:7px 9px;background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.12);border-radius:6px;color:var(--text);font-size:12px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:1px}
.car-btn:hover{background:rgba(58,143,212,0.25);border-color:rgba(58,143,212,0.5)}
.car-btn.active{background:rgba(58,143,212,0.35);border-color:#3a8fd4}
.car-btn .cname{font-weight:500;font-size:12px}
.car-btn .csize{font-size:10px;color:var(--text2)}
.color-row{display:flex;flex-wrap:wrap;gap:4px;padding:0 2px}
.color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.color-dot.sel{border-color:#fff}
.place-btn{width:100%;padding:9px;background:#3a8fd4;border:none;border-radius:6px;color:#fff;font-size:12px;font-weight:500;cursor:pointer}
.place-btn:hover{background:#2a7fc4}
.place-btn:disabled{background:#2a3f58;color:#556;cursor:not-allowed}
.remove-btn{width:100%;padding:7px;background:rgba(200,60,60,0.2);border:0.5px solid rgba(200,60,60,0.4);border-radius:6px;color:#f88;font-size:11px;cursor:pointer}
.remove-btn:hover{background:rgba(200,60,60,0.35)}
.wall-ctrl{position:absolute;bottom:10px;right:10px;display:none;background:rgba(10,20,35,0.88);border:0.5px solid rgba(255,255,255,0.15);border-radius:8px;padding:8px 12px;min-width:150px}
.wall-ctrl .wlabel{font-size:11px;color:rgba(200,220,240,0.65);margin-bottom:5px}
.wall-ctrl .wrow{display:flex;align-items:center;gap:8px}
.wall-ctrl input[type=range]{flex:1;accent-color:#3a8fd4}
.wall-ctrl .wval{font-size:12px;color:#fff;font-weight:500;min-width:36px;text-align:right}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar"><img src="logo.png?v=3" alt="logo"></div>
  <div class="view-toggle">
    <button class="vbtn active" id="btn2d" onclick="setView('2d')">2D 平面図</button>
    <button class="vbtn" id="btn3d" onclick="setView('3d')">3D ビュー</button>
  </div>

  <div class="card">
    <p class="sec-title">基本寸法</p>
    <div class="grid2">
      <div class="field"><label>ピット間口 (mm)</label><input type="number" id="maguchi" value="10000" step="0.1"></div>
      <div class="field"><label>ピット奥行き (mm)</label><input type="number" id="okuyuki" value="5200" step="0.1"></div>
    </div>
    <div class="grid2">
      <div class="field hidden" id="takasa-field"><label>高さ (mm)</label><input type="number" id="takasa" value="2000" step="10" min="500"></div>
    </div>
  </div>

  <div class="card">
    <p class="sec-title">ライン設定</p>
    <div class="grid3">
      <div class="field"><label>連数</label>
        <select id="rensuu">
          <option value="1">1連</option><option value="2">2連</option><option value="3">3連</option>
          <option value="4" selected>4連</option><option value="5">5連</option><option value="6">6連</option>
          <option value="7">7連</option><option value="8">8連</option><option value="9">9連</option>
          <option value="10">10連</option><option value="11">11連</option><option value="12">12連</option>
        </select>
      </div>
      <div class="field"><label>ラインパターン</label>
        <select id="pattern"><option value="U字">U字</option><option value="I字">I字</option></select>
      </div>
      <div class="field" id="ujihaba-field"><label>U字幅 (mm)</label><input type="number" id="ujihaba" value="500" step="0.1"></div>
    </div>
    <div class="grid3">
      <div class="field"><label>左スキマ (mm)</label><input type="number" id="hidari" value="250" step="0.1"></div>
      <div class="field"><label>右スキマ (mm)</label><input type="number" id="migi" value="250" step="0.1"></div>
      <div class="field"><label>前スキマ (mm)</label><input type="number" id="mae" value="200" step="0.1"></div>
    </div>
    <div class="grid3">
      <div class="field"><label>後スキマ (mm)</label><input type="number" id="ushiro" value="1000" step="0.1"></div>
      <div class="field"><label>ライン太さ (mm)</label><input type="number" id="linewidth" value="100" step="10" min="10"></div>
    </div>
    <button class="reset-btn" id="resetBtn">↩ デフォルトに戻す</button>
    <button class="reset-btn" id="saveBtn" style="margin-left:8px;">📥 図をPNGで保存</button>
  </div>

  <div id="warn" class="warn" style="display:none"></div>
  <div id="manualBadge" class="manual-badge">
    <span>✏ ライン手動配置モード</span>
    <button onclick="exitManual()">自動配置に戻す</button>
  </div>
  <div id="metrics" class="metric-grid"></div>

  <div class="canvas-wrap" id="cwrap">
    <canvas id="cv"></canvas>
    <canvas id="cv3" width="860" height="500"></canvas>
    <div class="hint3d" id="hint3d">ドラッグ: 回転<br>スクロール: ズーム</div>
    <div class="side-menu" id="sideMenu">
      <div class="smtitle">車種を選択</div>
      <button class="car-btn active" id="cb0" onclick="selectCar(0)"><span class="cname">セダン</span><span class="csize">W1700 D4500 H1450</span></button>
      <button class="car-btn" id="cb1" onclick="selectCar(1)"><span class="cname">SUV</span><span class="csize">W1850 D4600 H1700</span></button>
      <button class="car-btn" id="cb2" onclick="selectCar(2)"><span class="cname">ミニバン</span><span class="csize">W1730 D4700 H1850</span></button>
      <button class="car-btn" id="cb3" onclick="selectCar(3)"><span class="cname">軽自動車</span><span class="csize">W1480 D3400 H1700</span></button>
      <button class="car-btn" id="cb4" onclick="selectCar(4)"><span class="cname">コンパクト</span><span class="csize">W1695 D3900 H1525</span></button>
      <div class="smtitle">カラー</div>
      <div class="color-row" id="colorRow"></div>
      <div style="flex:1"></div>
      <button class="place-btn" id="placeBtn" onclick="placeCar()">車を設置する</button>
      <button class="remove-btn" onclick="removeCar()" style="margin-top:4px">車を取り除く</button>
    </div>
    <div class="wall-ctrl" id="wallCtrl">
      <div class="wlabel">外壁の透明度</div>
      <div class="wrow">
        <input type="range" id="wallOpacity" min="0" max="100" value="100" step="1">
        <span class="wval" id="wallOpacityVal">100%</span>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

// ===== 定数 =====
var SC=0.004;
var PR_W=160, PR_H=110, PR_L=560;
var CAR_TYPES=[
  {name:'セダン',    W:1700, D:4500, H:1450, roofRatio:0.48, cabinZOff: 0.05, cabinDRatio:0.52},
  {name:'SUV',      W:1850, D:4600, H:1700, roofRatio:0.55, cabinZOff: 0.00, cabinDRatio:0.58},
  {name:'ミニバン',  W:1730, D:4700, H:1850, roofRatio:0.65, cabinZOff:-0.05, cabinDRatio:0.72},
  {name:'軽自動車',  W:1480, D:3400, H:1700, roofRatio:0.62, cabinZOff:-0.02, cabinDRatio:0.68},
  {name:'コンパクト',W:1695, D:3900, H:1525, roofRatio:0.50, cabinZOff: 0.02, cabinDRatio:0.54}
];
var CAR_COLORS=[0x2255aa,0xcc3322,0x228844,0x888888,0x111111,0xddddcc,0x334488,0x995522];
var COLOR_HEX =['#2255aa','#cc3322','#228844','#888888','#111111','#ddddcc','#334488','#995522'];

// ===== 状態 =====
var currentView='2d';
var wallOpacity=1.0, wallMats=[];
var scene, camera, renderer3, animId;
var isDrag3=false, lastMX=0, lastMY=0, theta=0.6, phi=0.45, rad=22;
var selectedCar=0, selectedColor=0, carGroup=null, isAnimating=false, stopZ=0;

// ===== ライン位置管理 =====
// linePositions: ピット左端からのX座標(mm)昇順配列 (ライン中心位置)
// U字: 長さ 2n [左外壁, 区画1右, 区画2左, 区画2右, ..., 区画n左, 右外壁]
//      ペア構造: (0,1)区画1, (2,3)区画2, ..., (2n-2,2n-1)区画n
//      U字は (1,2), (3,4), ..., (2n-3, 2n-2) ※区画間
// I字: 長さ n+1
var linePositions=null;
var linePattern=null;
var lineN=null;
var manualMode=false;

// ===== ユーティリティ =====
function fmt(v){var r=Math.round(v*10)/10;return(r%1===0)?r.toString():r.toFixed(1)}
function gv(id){return+document.getElementById(id).value}
function getBaseP(){
  var pat=document.getElementById('pattern').value, lw=gv('linewidth'), U=gv('ujihaba');
  var eU=(pat==='I字')?lw:U, L=gv('maguchi'), D=gv('okuyuki'), n=gv('rensuu');
  var lS=gv('hidari'), rS=gv('migi'), maeS=gv('mae'), ushiroS=gv('ushiro');
  var ku=(L-lS-rS-eU*(n-1))/n;
  return{L:L,D:D,n:n,pat:pat,U:U,lS:lS,rS:rS,maeS:maeS,ushiroS:ushiroS,lw:lw,eU:eU,ku:ku,H:gv('takasa')||2000};
}

// 自動配置からlinePositions(中心X mm)を生成
function autoLinePositions(p){
  var arr=[];
  if(p.pat==='U字'){
    // 左外壁: 元コードで「lSx-half」を中心とする線 → 中心X = lS - lw/2
    arr.push(p.lS - p.lw/2);
    for(var k=0;k<p.n-1;k++){
      var gS=p.lS+(k+1)*p.ku+k*p.eU;
      arr.push(gS + p.lw/2);
      arr.push(gS + p.eU - p.lw/2);
    }
    arr.push((p.L - p.rS) + p.lw/2);
  }else{
    arr.push(p.lS - p.lw/2);
    for(var k=0;k<p.n-1;k++){
      arr.push(p.lS + (k+1)*p.ku + k*p.eU + p.eU/2);
    }
    arr.push((p.L - p.rS) + p.lw/2);
  }
  return arr;
}

function getLinePositions(p){
  if(manualMode && linePositions && linePattern===p.pat && lineN===p.n){
    return linePositions.slice();
  }
  return autoLinePositions(p);
}

function updateMetrics(p){
  var w=document.getElementById('warn');
  var b=document.getElementById('manualBadge');
  b.classList.toggle('active', manualMode);

  if(p.ku<=0 && !manualMode){w.style.display='block';w.textContent='区画幅が0以下になっています。';return false}
  w.style.display='none';
  var t=' mm</span></div></div>', s='<span style="font-size:12px;font-weight:400;color:var(--text2)">';

  if(manualMode){
    var lineCount=linePositions?linePositions.length:0;
    document.getElementById('metrics').innerHTML=
      '<div class="metric"><div class="lbl">ライン本数</div><div class="val">'+lineCount+s+' 本</span></div></div>'+
      '<div class="metric"><div class="lbl">連数</div><div class="val">'+p.n+s+' 連</span></div></div>'+
      '<div class="metric" style="grid-column:span 2"><div class="lbl">モード</div><div class="val" style="font-size:14px;color:#e07820">手動配置（図上でラインをドラッグ）</div></div>';
  }else{
    document.getElementById('metrics').innerHTML=
      '<div class="metric"><div class="lbl">区画幅</div><div class="val">'+fmt(p.ku)+s+t+
      '<div class="metric"><div class="lbl">ライン間隔</div><div class="val">'+fmt(p.ku+p.eU)+s+t+
      '<div class="metric"><div class="lbl">ライン本数</div><div class="val">'+(p.pat==='U字'?2*p.n:p.n+1)+s+' 本</span></div></div>'+
      '<div class="metric"><div class="lbl">連数</div><div class="val">'+p.n+s+' 連</span></div></div>';
  }
  return true;
}

// ===== 2D描画 =====
function dimSeg(ctx,xA,xB,y,label,color){
  color=color||'#8fa8c0';ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(xA,y-4);ctx.lineTo(xA,y+4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(xB,y-4);ctx.lineTo(xB,y+4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(xA,y);ctx.lineTo(xB,y);ctx.stroke();
  var ah=4;
  if(xB-xA>ah*3){
    ctx.beginPath();ctx.moveTo(xA,y);ctx.lineTo(xA+ah,y-ah/2);ctx.lineTo(xA+ah,y+ah/2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(xB,y);ctx.lineTo(xB-ah,y-ah/2);ctx.lineTo(xB-ah,y+ah/2);ctx.closePath();ctx.fill();
  }
  if(label){
    ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,(xA+xB)/2,y+11);
  }
}

var draw2DCtx=null;

function draw2D(){
  var p=getBaseP();if(!updateMetrics(p))return;
  var L=p.L,D=p.D,n=p.n,pat=p.pat,lS=p.lS,rS=p.rS,maeS=p.maeS,ushiroS=p.ushiroS,lw=p.lw;
  var positions=getLinePositions(p);
  var wall=250, cv=document.getElementById('cv');
  var marginL=95, marginR=50, marginT=20, marginB=105;
  var maxW=Math.min(860,cv.parentElement.offsetWidth-2);
  var totalW=L+wall*2, totalD=D+wall*2;
  var scale=Math.min((maxW-marginL-marginR)/totalW, 350/totalD);
  cv.width=Math.round(totalW*scale)+marginL+marginR;
  cv.height=Math.round(totalD*scale)+marginT+marginB;
  var ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);ctx.fillStyle='#ffffff';ctx.fillRect(0,0,cv.width,cv.height);
  var ox=marginL, oy=marginT, outerW=Math.round(totalW*scale), outerH=Math.round(totalD*scale);
  var pitX=ox+wall*scale, pitY=oy+wall*scale, pitW=L*scale, pitH=D*scale;

  // 外枠・ピット内部
  ctx.fillStyle='#c8c8c8';ctx.fillRect(ox,oy,outerW,outerH);
  ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.strokeRect(ox,oy,outerW,outerH);
  ctx.fillStyle='#dde8f0';ctx.fillRect(pitX,pitY,pitW,pitH);
  ctx.strokeStyle='#555';ctx.lineWidth=1.5;ctx.strokeRect(pitX,pitY,pitW,pitH);
  ctx.fillStyle='rgba(180,210,230,0.3)';
  var sH=Math.max(3,pitH/20);
  for(var sy=pitY;sy<pitY+pitH;sy+=sH*2) ctx.fillRect(pitX,sy,pitW,sH);

  // 補助線 (ushiro/mae)
  var ushiroSy=pitY+ushiroS*scale, maeSy=pitY+pitH-maeS*scale;
  ctx.strokeStyle='#aaa';ctx.setLineDash([4,3]);ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(pitX,ushiroSy);ctx.lineTo(pitX+pitW,ushiroSy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pitX,maeSy);ctx.lineTo(pitX+pitW,maeSy);ctx.stroke();
  ctx.setLineDash([]);

  // ラインパターン
  var lineColor='#e07820', lineW=Math.max(1,lw*scale);
  ctx.strokeStyle=lineColor;ctx.lineWidth=lineW;ctx.lineCap='butt';

  if(pat==='U字'){
    // 外側2本 (i=0, i=2n-1) は直線
    var cx0=pitX+positions[0]*scale, cxN=pitX+positions[positions.length-1]*scale;
    ctx.beginPath();ctx.moveTo(cx0,ushiroSy);ctx.lineTo(cx0,maeSy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cxN,ushiroSy);ctx.lineTo(cxN,maeSy);ctx.stroke();
    // U字ペア: (1,2), (3,4), ..., (2n-3, 2n-2)
    for(var k=0;k<n-1;k++){
      var li=1+2*k, ri=li+1;
      var lx=pitX+positions[li]*scale, rx=pitX+positions[ri]*scale;
      var r=Math.max(lineW,(rx-lx)/2);
      var botY=maeSy-r;
      ctx.lineJoin='round';
      ctx.beginPath();
      ctx.moveTo(lx,ushiroSy);ctx.lineTo(lx,botY);
      ctx.arcTo(lx,botY+r,lx+r,botY+r,r);ctx.arcTo(rx,botY+r,rx,botY,r);
      ctx.lineTo(rx,ushiroSy);ctx.stroke();
    }
  }else{
    for(var i=0;i<positions.length;i++){
      var cx=pitX+positions[i]*scale;
      ctx.beginPath();ctx.moveTo(cx,ushiroSy);ctx.lineTo(cx,maeSy);ctx.stroke();
    }
  }

  // 車止め＋反射板 (各区画中央に配置)
  var segPairs=[];
  if(pat==='U字'){
    for(var k=0;k<n;k++) segPairs.push([positions[2*k], positions[2*k+1]]);
  }else{
    for(var k=0;k<n;k++) segPairs.push([positions[k], positions[k+1]]);
  }
  for(var k=0;k<segPairs.length;k++){
    var sLx2=pitX+segPairs[k][0]*scale, sRx2=pitX+segPairs[k][1]*scale;
    var off=50*scale, sw2=560*scale, sh2=160*scale;
    [sLx2+off+sw2/2, sRx2-off-sw2/2].forEach(function(cx){
      var sx=cx-sw2/2, sy2=ushiroSy;
      ctx.fillStyle='#111';ctx.fillRect(sx,sy2,sw2,sh2);
      var rw=sw2*0.72, rh=sh2*(40/160), rx2=cx-rw/2;
      var ry2=sy2+sh2 - 53.5*(sh2/160) - rh/2;
      ctx.fillStyle='#333';ctx.fillRect(rx2-1,ry2-1,rw+2,rh+2);
      ctx.fillStyle='#f5c200';ctx.fillRect(rx2,ry2,rw,rh);
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fillRect(rx2,ry2,rw,rh*0.4);
    });
  }

  // 個別寸法
  var dimY1=pitY+pitH+35;
  if(pat==='U字'){
    // 左スキマ: pitX〜(positions[0]+lw/2) ※外壁ラインの内側エッジまで
    dimSeg(ctx,pitX,pitX+(positions[0]+lw/2)*scale,dimY1,fmt(positions[0]+lw/2),'#555');
    for(var k=0;k<n;k++){
      var segL=positions[2*k]+lw/2, segR=positions[2*k+1]-lw/2;
      dimSeg(ctx,pitX+segL*scale,pitX+segR*scale,dimY1,fmt(segR-segL),'#1a6b9e');
      if(k<n-1){
        // U字幅: 区画間の中心線間距離
        var uxL=positions[2*k+1], uxR=positions[2*k+2];
        dimSeg(ctx,pitX+uxL*scale,pitX+uxR*scale,dimY1,fmt(uxR-uxL),'#c87000');
      }
    }
    // 右スキマ
    dimSeg(ctx,pitX+(positions[positions.length-1]-lw/2)*scale,pitX+pitW,dimY1,fmt(L-(positions[positions.length-1]-lw/2)),'#555');
  }else{
    // I字
    dimSeg(ctx,pitX,pitX+(positions[0]+lw/2)*scale,dimY1,fmt(positions[0]+lw/2),'#555');
    for(var k=0;k<n;k++){
      var a=positions[k], b=positions[k+1];
      var segL=(k===0)?a+lw/2:a;
      var segR=(k===n-1)?b-lw/2:b;
      dimSeg(ctx,pitX+segL*scale,pitX+segR*scale,dimY1,fmt(segR-segL),'#1a6b9e');
    }
    dimSeg(ctx,pitX+(positions[n]-lw/2)*scale,pitX+pitW,dimY1,fmt(L-(positions[n]-lw/2)),'#555');
  }

  // 間口総寸法
  var dimY2=dimY1+38;
  ctx.strokeStyle='#555';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(pitX,pitY+pitH+6);ctx.lineTo(pitX,dimY2+6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pitX+pitW,pitY+pitH+6);ctx.lineTo(pitX+pitW,dimY2+6);ctx.stroke();
  dimSeg(ctx,pitX,pitX+pitW,dimY2,'ピット間口 '+fmt(L),'#222');

  // 奥行き寸法
  var ah=4, dX=ox-14;
  ctx.strokeStyle='#222';ctx.fillStyle='#222';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(dX,pitY);ctx.lineTo(dX,pitY+pitH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(dX,pitY);ctx.lineTo(dX-ah/2,pitY+ah);ctx.lineTo(dX+ah/2,pitY+ah);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(dX,pitY+pitH);ctx.lineTo(dX-ah/2,pitY+pitH-ah);ctx.lineTo(dX+ah/2,pitY+pitH-ah);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#555';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(dX-4,pitY);ctx.lineTo(ox,pitY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(dX-4,pitY+pitH);ctx.lineTo(ox,pitY+pitH);ctx.stroke();
  ctx.save();ctx.translate(dX-10,pitY+pitH/2);ctx.rotate(-Math.PI/2);
  ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#222';
  ctx.fillText('ピット奥行き '+fmt(D),0,0);ctx.restore();

  // 後スキマ寸法
  var dX2=ox+outerW+12;
  ctx.strokeStyle='#555';ctx.fillStyle='#555';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(dX2,pitY);ctx.lineTo(dX2,ushiroSy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(dX2,pitY);ctx.lineTo(dX2-ah/2,pitY+ah);ctx.lineTo(dX2+ah/2,pitY+ah);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(dX2,ushiroSy);ctx.lineTo(dX2-ah/2,ushiroSy-ah);ctx.lineTo(dX2+ah/2,ushiroSy-ah);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#555';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(pitX+pitW,pitY);ctx.lineTo(dX2+4,pitY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pitX+pitW,ushiroSy);ctx.lineTo(dX2+4,ushiroSy);ctx.stroke();
  ctx.save();ctx.translate(dX2+10,pitY+ushiroS*scale/2);ctx.rotate(-Math.PI/2);
  ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#555';
  ctx.fillText('後スキマ '+fmt(ushiroS),0,0);ctx.restore();

  draw2DCtx={pitX:pitX, pitY:pitY, pitW:pitW, pitH:pitH, scale:scale, ushiroSy:ushiroSy, maeSy:maeSy, p:p, positions:positions};
}

// ===== 2D マウス操作 =====
var dragIdx=-1;
function hitTestLine(mx,my){
  if(!draw2DCtx) return -1;
  var c=draw2DCtx;
  if(my<c.ushiroSy-5 || my>c.maeSy+5) return -1;
  var tol=6;
  var best=-1, bestDist=tol+1;
  for(var i=0;i<c.positions.length;i++){
    var lx=c.pitX+c.positions[i]*c.scale;
    var d=Math.abs(mx-lx);
    if(d<=tol && d<bestDist){ best=i; bestDist=d; }
  }
  return best;
}
function canvasXY(evt){
  var cv=document.getElementById('cv');
  var rect=cv.getBoundingClientRect();
  var sx=cv.width/rect.width, sy=cv.height/rect.height;
  return {x:(evt.clientX-rect.left)*sx, y:(evt.clientY-rect.top)*sy};
}

// ドラッグ対象: U字ならペア単位、I字なら単独。
// getDragGroup(idx, pat, n): ドラッグ対象の[startIdx, endIdx](両端含む)を返す
function getDragGroup(idx, pat, n){
  if(pat==='U字'){
    // i=0: 単独(左外壁)
    if(idx===0) return [0,0];
    // i=2n-1: 単独(右外壁)
    if(idx===2*n-1) return [2*n-1, 2*n-1];
    // それ以外: ペア。奇数インデックスなら (idx, idx+1)、偶数なら (idx-1, idx)
    if(idx%2===1) return [idx, idx+1];
    return [idx-1, idx];
  }
  // I字: 単独
  return [idx, idx];
}

function setup2DMouse(){
  var cv=document.getElementById('cv');
  cv.addEventListener('mousemove', function(e){
    if(currentView!=='2d')return;
    var pt=canvasXY(e);
    if(dragIdx>=0){
      if(!manualMode){
        var p0=getBaseP();
        linePositions=autoLinePositions(p0);
        linePattern=p0.pat; lineN=p0.n;
        manualMode=true;
      }
      var c=draw2DCtx;
      var pointerX=(pt.x - c.pitX)/c.scale;
      var minGap=c.p.lw;
      var grp=getDragGroup(dragIdx, c.p.pat, c.p.n);
      var gStart=grp[0], gEnd=grp[1];
      // グループ全体の変位 = ポインタ位置 - 掴んだラインの元位置
      var delta=pointerX - linePositions[dragIdx];
      // 左制約: グループ先頭がグループ外の左隣 + minGap を下回らない
      var lo=(gStart>0)?linePositions[gStart-1]+minGap:minGap/2;
      // 右制約: グループ末尾がグループ外の右隣 - minGap を超えない
      var hi=(gEnd<linePositions.length-1)?linePositions[gEnd+1]-minGap:c.p.L-minGap/2;
      // delta の最小/最大制約
      var minDelta=lo - linePositions[gStart];
      var maxDelta=hi - linePositions[gEnd];
      delta=Math.max(minDelta, Math.min(maxDelta, delta));
      for(var gi=gStart; gi<=gEnd; gi++){
        linePositions[gi]+=delta;
      }
      draw2D();
      cv.classList.add('grabbing');
    }else{
      var idx=hitTestLine(pt.x, pt.y);
      cv.classList.remove('grabbing');
      if(idx>=0) cv.classList.add('grab');
      else cv.classList.remove('grab');
    }
  });
  cv.addEventListener('mousedown', function(e){
    if(currentView!=='2d')return;
    var pt=canvasXY(e);
    var idx=hitTestLine(pt.x, pt.y);
    if(idx>=0){
      dragIdx=idx;
      cv.classList.add('grabbing');
      e.preventDefault();
    }
  });
  window.addEventListener('mouseup', function(){
    if(dragIdx>=0){
      dragIdx=-1;
      document.getElementById('cv').classList.remove('grabbing');
    }
  });
  // タッチ対応
  cv.addEventListener('touchstart', function(e){
    if(currentView!=='2d'||e.touches.length!==1)return;
    var t=e.touches[0];
    var rect=cv.getBoundingClientRect();
    var sx=cv.width/rect.width, sy=cv.height/rect.height;
    var pt={x:(t.clientX-rect.left)*sx, y:(t.clientY-rect.top)*sy};
    var idx=hitTestLine(pt.x, pt.y);
    if(idx>=0){dragIdx=idx; e.preventDefault();}
  }, {passive:false});
  cv.addEventListener('touchmove', function(e){
    if(currentView!=='2d'||dragIdx<0||e.touches.length!==1)return;
    var t=e.touches[0];
    var rect=cv.getBoundingClientRect();
    var sx=cv.width/rect.width, sy=cv.height/rect.height;
    var pt={x:(t.clientX-rect.left)*sx, y:(t.clientY-rect.top)*sy};
    if(!manualMode){
      var p0=getBaseP();
      linePositions=autoLinePositions(p0);
      linePattern=p0.pat; lineN=p0.n;
      manualMode=true;
    }
    var c=draw2DCtx;
    var pointerX=(pt.x - c.pitX)/c.scale;
    var minGap=c.p.lw;
    var grp=getDragGroup(dragIdx, c.p.pat, c.p.n);
    var gStart=grp[0], gEnd=grp[1];
    var delta=pointerX - linePositions[dragIdx];
    var lo=(gStart>0)?linePositions[gStart-1]+minGap:minGap/2;
    var hi=(gEnd<linePositions.length-1)?linePositions[gEnd+1]-minGap:c.p.L-minGap/2;
    var minDelta=lo - linePositions[gStart];
    var maxDelta=hi - linePositions[gEnd];
    delta=Math.max(minDelta, Math.min(maxDelta, delta));
    for(var gi=gStart; gi<=gEnd; gi++){
      linePositions[gi]+=delta;
    }
    draw2D();
    e.preventDefault();
  }, {passive:false});
  cv.addEventListener('touchend', function(){dragIdx=-1;});
}

window.exitManual=function(){
  manualMode=false;
  linePositions=null;
  draw();
};

// ===== 3D: テクスチャ =====
function makeConcreteTexture(){
  var sz=256, can=document.createElement('canvas');can.width=sz;can.height=sz;
  var ctx=can.getContext('2d');ctx.fillStyle='#909088';ctx.fillRect(0,0,sz,sz);
  for(var i=0;i<5000;i++){
    var x=Math.random()*sz, y=Math.random()*sz, rr=Math.random()*1.8+0.3;
    var v=Math.floor(Math.random()*35)-17, c2=140+v;
    ctx.fillStyle='rgba('+c2+','+c2+','+(c2-3)+',0.2)';
    ctx.beginPath();ctx.arc(x,y,rr,0,Math.PI*2);ctx.fill();
  }
  for(var j=1;j<4;j++){
    ctx.strokeStyle='rgba(50,50,45,0.15)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,j*sz/4);ctx.lineTo(sz,j*sz/4);ctx.stroke();
  }
  var tex=new THREE.CanvasTexture(can);
  tex.wrapS=THREE.RepeatWrapping;tex.wrapT=THREE.RepeatWrapping;tex.repeat.set(2,3);
  return tex;
}

// ===== 3D: 車両モデル =====
function makeCar3D(typeIdx, colorHex, sc){
  var t=CAR_TYPES[typeIdx], cW=t.W*sc, cD=t.D*sc, cH=t.H*sc;
  var g=new THREE.Group();
  var bodyMat=new THREE.MeshStandardMaterial({color:colorHex,roughness:0.35,metalness:0.4});
  var tR=cH*0.13, tW=cW*0.11, lift=tR*1.05;
  var loH=cH*(1-t.roofRatio);
  var lo=new THREE.Mesh(new THREE.BoxGeometry(cW,loH,cD),bodyMat);
  lo.position.y=loH/2+lift;g.add(lo);
  var cabW=cW*0.94, cabH=cH*t.roofRatio, cabD=cD*t.cabinDRatio, cabZOff=cD*t.cabinZOff;
  var cab=new THREE.Mesh(new THREE.BoxGeometry(cabW,cabH,cabD),bodyMat);
  cab.position.set(0,loH+cabH/2+lift,cabZOff);g.add(cab);
  var glassMat=new THREE.MeshStandardMaterial({color:0x99ccee,transparent:true,opacity:0.55});
  var fg=new THREE.Mesh(new THREE.BoxGeometry(cabW*0.88,cabH*0.7,0.01),glassMat);
  fg.position.set(0,loH+cabH*0.5+lift,cabZOff+cabD/2);g.add(fg);
  var rg=new THREE.Mesh(new THREE.BoxGeometry(cabW*0.82,cabH*0.62,0.01),glassMat);
  rg.position.set(0,loH+cabH*0.5+lift,cabZOff-cabD/2);g.add(rg);
  var tCX=cW/2-tW/2-cW*0.01;
  var tireMat=new THREE.MeshStandardMaterial({color:0x111111,roughness:0.9});
  var rimMat=new THREE.MeshStandardMaterial({color:0xb0b0b0,metalness:0.7});
  [[-tCX,tR,cD*0.32],[tCX,tR,cD*0.32],[-tCX,tR,-cD*0.3],[tCX,tR,-cD*0.3]].forEach(function(pos){
    var tire=new THREE.Mesh(new THREE.CylinderGeometry(tR,tR,tW,20),tireMat);
    tire.rotation.z=Math.PI/2;tire.position.set(pos[0],pos[1],pos[2]);g.add(tire);
    var rim=new THREE.Mesh(new THREE.CylinderGeometry(tR*0.58,tR*0.58,tW+0.002,12),rimMat);
    rim.rotation.z=Math.PI/2;rim.position.set(pos[0],pos[1],pos[2]);g.add(rim);
  });
  var tailMat=new THREE.MeshStandardMaterial({color:0xff2200,emissive:0x550000});
  var headMat=new THREE.MeshStandardMaterial({color:0xffffdd,emissive:0x222200});
  [-1,1].forEach(function(s){
    var tl=new THREE.Mesh(new THREE.BoxGeometry(cW*0.13,cH*0.07,0.015),tailMat);
    tl.position.set(s*cW*0.34,loH*0.65+lift,-cD/2);g.add(tl);
    var hl=new THREE.Mesh(new THREE.BoxGeometry(cW*0.13,cH*0.06,0.015),headMat);
    hl.position.set(s*cW*0.34,loH*0.62+lift,cD/2);g.add(hl);
  });
  var plate=new THREE.Mesh(new THREE.BoxGeometry(cW*0.28,cH*0.045,0.01),
    new THREE.MeshStandardMaterial({color:0xeeeeff}));
  plate.position.set(0,loH*0.38+lift,-cD/2);g.add(plate);
  return g;
}

function makeRubberStopperGeo(length){
  var shape=new THREE.Shape();
  shape.moveTo(80,0);shape.lineTo(80,45);shape.lineTo(27,110);
  shape.lineTo(-27,110);shape.lineTo(-80,45);shape.lineTo(-80,0);shape.lineTo(80,0);
  return new THREE.ExtrudeGeometry(shape,{depth:1,bevelEnabled:false});
}

function makeHalfRingMesh(cx, cz, rMid, lwSc, thick, mat){
  var rOut=rMid+lwSc/2, rIn=Math.max(0.001,rMid-lwSc/2);
  var shape=new THREE.Shape();
  shape.moveTo(rOut,0);
  shape.absarc(0,0,rOut,0,-Math.PI,true);
  shape.lineTo(-rIn,0);
  shape.absarc(0,0,rIn,-Math.PI,0,false);
  shape.lineTo(rOut,0);
  var geo=new THREE.ExtrudeGeometry(shape,{depth:thick,bevelEnabled:false,curveSegments:24});
  var m=new THREE.Mesh(geo,mat);
  m.rotation.x=-Math.PI/2;
  m.position.set(cx, 0, cz);
  return m;
}

// ===== 3D: シーン構築 =====
function build3D(){
  if(!scene)return;
  wallMats=[];carGroup=null;isAnimating=false;
  document.getElementById('placeBtn').disabled=false;
  while(scene.children.length>4) scene.remove(scene.children[4]);
  var p=getBaseP();if(!updateMetrics(p))return;
  var positions=getLinePositions(p);
  var L=p.L,D=p.D,n=p.n,pat=p.pat,lS=p.lS,rS=p.rS,maeS=p.maeS,ushiroS=p.ushiroS,lw=p.lw,H=p.H;
  var wall=250, wallH=H*SC, wallT=wall*SC;
  var totalW=(L+wall*2)*SC, totalD=(D+wall*2)*SC;
  var pitOX=(-L/2)*SC, pitOZ=(-D/2)*SC;

  scene.add(new THREE.GridHelper(80,80,0x1a3a5a,0x152a45));

  [[totalW,wallH,wallT,0,wallH/2,-totalD/2+wallT/2],
   [totalW,wallH,wallT,0,wallH/2,totalD/2-wallT/2],
   [wallT,wallH,totalD,-totalW/2+wallT/2,wallH/2,0],
   [wallT,wallH,totalD,totalW/2-wallT/2,wallH/2,0]].forEach(function(w){
    var mat=new THREE.MeshStandardMaterial({map:makeConcreteTexture(),color:0xb2b0a8,roughness:0.88,metalness:0.02,
      side:THREE.DoubleSide,transparent:wallOpacity<0.999,opacity:wallOpacity,depthWrite:wallOpacity>=0.999});
    wallMats.push(mat);
    var m=new THREE.Mesh(new THREE.BoxGeometry(w[0],w[1],w[2]),mat);
    m.position.set(w[3],w[4],w[5]);scene.add(m);
  });

  var stex=makeConcreteTexture();stex.repeat.set(4,4);
  var sf=new THREE.Mesh(new THREE.BoxGeometry(totalW,0.04,totalD),
    new THREE.MeshStandardMaterial({map:stex,color:0xb2b0a8,roughness:0.88}));
  sf.position.set(0,wallH,0);scene.add(sf);
  var pf=new THREE.Mesh(new THREE.BoxGeometry(L*SC,0.04,D*SC),
    new THREE.MeshStandardMaterial({color:0xdde8f0,roughness:0.8}));
  pf.position.set(0,wallH+0.02,0);scene.add(pf);
  var stripD=D*SC/20;
  var smat=new THREE.MeshStandardMaterial({color:0xb4d2e6,roughness:0.9,transparent:true,opacity:0.3});
  for(var si=0;si<10;si++){
    var sm2=new THREE.Mesh(new THREE.PlaneGeometry(L*SC,stripD),smat);
    sm2.rotation.x=-Math.PI/2;
    sm2.position.set(0,wallH+0.04,pitOZ+stripD/2+si*stripD*2);scene.add(sm2);
  }

  // ライン
  var lineH3=0.1*SC, lwSc=lw*SC, ushZ=pitOZ+ushiroS*SC, maeZ=pitOZ+(D-maeS)*SC, baseY=wallH+0.04;
  var lineY=baseY+0.001;
  var lineMat=new THREE.MeshStandardMaterial({color:0xe07820,roughness:0.3,emissive:0x331500});
  function addLine(cx,z,d){
    var m=new THREE.Mesh(new THREE.BoxGeometry(lwSc,lineH3,d),lineMat);
    m.position.set(cx,lineY+lineH3/2,z+d/2);scene.add(m);
  }
  function addHalfRing(cx,cz,rMid){
    var m=makeHalfRingMesh(cx,cz,rMid,lwSc,lineH3,lineMat);
    m.position.y=lineY;
    scene.add(m);
  }

  if(pat==='U字'){
    addLine(pitOX+positions[0]*SC, ushZ, maeZ-ushZ);
    addLine(pitOX+positions[positions.length-1]*SC, ushZ, maeZ-ushZ);
    for(var k=0;k<n-1;k++){
      var lxC=pitOX+positions[1+2*k]*SC;
      var rxC=pitOX+positions[2+2*k]*SC;
      var rMid=(rxC-lxC)/2;
      if(rMid<lwSc) rMid=lwSc;
      var cx=(lxC+rxC)/2;
      var arcCZ=maeZ-rMid;
      var vLen=arcCZ-ushZ;
      if(vLen>0){
        addLine(lxC, ushZ, vLen);
        addLine(rxC, ushZ, vLen);
      }
      addHalfRing(cx, arcCZ, rMid);
    }
  }else{
    for(var i=0;i<positions.length;i++){
      addLine(pitOX+positions[i]*SC, ushZ, maeZ-ushZ);
    }
  }

  // 車止め
  var rubberMat=new THREE.MeshStandardMaterial({color:0x111111,roughness:0.75,metalness:0.05});
  var tapeMat=new THREE.MeshStandardMaterial({color:0xf5c200,roughness:0.35,metalness:0.2,emissive:0x332100,side:THREE.DoubleSide});
  var prLen=PR_L*SC, prWsc=PR_W*SC, off2=50*SC;
  var slopeAngle=Math.atan2(80-27,110-45);
  var slopeLenMM=Math.sqrt((80-27)*(80-27)+(110-45)*(110-45));
  var slopeMidX=(80+27)/2, slopeMidY=(45+110)/2, eps=0.001;

  var segPairs3=[];
  if(pat==='U字'){
    for(var k=0;k<n;k++) segPairs3.push([positions[2*k], positions[2*k+1]]);
  }else{
    for(var k=0;k<n;k++) segPairs3.push([positions[k], positions[k+1]]);
  }
  for(var k=0;k<segPairs3.length;k++){
    var sLx=pitOX+segPairs3[k][0]*SC, sRx=pitOX+segPairs3[k][1]*SC;
    [sLx+off2+prLen/2, sRx-off2-prLen/2].forEach(function(cx){
      var rg=makeRubberStopperGeo(prLen);
      rg.scale(SC,SC,prLen);rg.translate(0,0,-prLen/2);
      var rubber=new THREE.Mesh(rg,rubberMat);
      rubber.rotation.y=-Math.PI/2;
      rubber.position.set(cx,baseY,ushZ+prWsc/2);
      scene.add(rubber);
      var tape=new THREE.Mesh(new THREE.PlaneGeometry(prLen*0.72,slopeLenMM*0.75*SC),tapeMat);
      tape.rotation.x=-(Math.PI/2-slopeAngle);
      var ny=Math.cos(slopeAngle), nz=Math.sin(slopeAngle);
      tape.position.set(cx, baseY+slopeMidY*SC+ny*eps, ushZ+prWsc/2+slopeMidX*SC+nz*eps);
      scene.add(tape);
    });
  }
  rad=Math.max(totalW,totalD)*3.2+wallH*1.5+4;updateCam();
}

function updateCam(){
  if(!camera)return;
  var wallH=(gv('takasa')||2000)*SC, lookY=wallH/2;
  camera.position.set(Math.sin(theta)*rad*Math.cos(phi), lookY+Math.sin(phi)*rad, Math.cos(theta)*rad*Math.cos(phi));
  camera.lookAt(0,lookY,0);
}
function loop3D(){
  animId=requestAnimationFrame(loop3D);
  if(isAnimating&&carGroup){
    carGroup.position.z-=0.05;
    if(carGroup.position.z<=stopZ){
      carGroup.position.z=stopZ;isAnimating=false;
      document.getElementById('placeBtn').disabled=false;
    }
  }
  renderer3.render(scene,camera);
}
function init3D(){
  var c=document.getElementById('cv3'), cw=document.getElementById('cwrap');
  c.width=cw.offsetWidth||860;c.height=500;
  if(renderer3){renderer3.dispose();renderer3=null;}
  renderer3=new THREE.WebGLRenderer({canvas:c,antialias:true});
  renderer3.setSize(c.width,c.height,false);renderer3.setClearColor(0x0d1b2a);
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(50,c.width/c.height,0.1,2000);
  scene.add(new THREE.AmbientLight(0xffffff,0.55));
  var dl1=new THREE.DirectionalLight(0xffffff,1.2);dl1.position.set(10,20,10);scene.add(dl1);
  var dl2=new THREE.DirectionalLight(0x88bbff,0.5);dl2.position.set(-8,15,-8);scene.add(dl2);
  var dl3=new THREE.DirectionalLight(0xffffff,0.3);dl3.position.set(0,10,15);scene.add(dl3);
  if(animId)cancelAnimationFrame(animId);
  build3D();loop3D();
}

// ===== 車両配置 =====
window.selectCar=function(i){
  selectedCar=i;
  document.querySelectorAll('.car-btn').forEach(function(b,j){b.classList.toggle('active',j===i);});
};
window.placeCar=function(){
  if(isAnimating)return;
  if(carGroup){scene.remove(carGroup);carGroup=null;}
  var p=getBaseP();
  var positions=getLinePositions(p);
  var wallH=p.H*SC, baseY=wallH+0.04;
  var pitOZ=(-p.D/2)*SC, pitOX=(-p.L/2)*SC;
  var ushZ=pitOZ+p.ushiroS*SC, maeZ=pitOZ+(p.D-p.maeS)*SC;
  // 1区画目の中心
  var segL, segR;
  if(p.pat==='U字'){ segL=positions[0]; segR=positions[1]; }
  else { segL=positions[0]; segR=positions[1]; }
  var carCX=pitOX+((segL+segR)/2)*SC;
  var t=CAR_TYPES[selectedCar], cD=t.D*SC, tR=t.H*SC*0.13, prWsc=PR_W*SC;
  stopZ=ushZ+prWsc+tR+cD*0.3;
  carGroup=makeCar3D(selectedCar,CAR_COLORS[selectedColor],SC);
  carGroup.position.set(carCX,baseY,maeZ+cD*1.2);
  scene.add(carGroup);
  isAnimating=true;
  document.getElementById('placeBtn').disabled=true;
};
window.removeCar=function(){
  if(carGroup){scene.remove(carGroup);carGroup=null;}
  isAnimating=false;
  document.getElementById('placeBtn').disabled=false;
};
function updateWallOpacity(){
  wallMats.forEach(function(mat){
    mat.opacity=wallOpacity;mat.transparent=wallOpacity<0.999;
    mat.depthWrite=wallOpacity>=0.999;mat.needsUpdate=true;
  });
}

// ===== ビュー切替 =====
window.setView=function(mode){
  currentView=mode;
  document.getElementById('btn2d').classList.toggle('active',mode==='2d');
  document.getElementById('btn3d').classList.toggle('active',mode==='3d');
  document.getElementById('cv').style.display =(mode==='2d')?'block':'none';
  document.getElementById('cv3').style.display=(mode==='3d')?'block':'none';
  document.getElementById('hint3d').style.display  =(mode==='3d')?'block':'none';
  document.getElementById('wallCtrl').style.display=(mode==='3d')?'block':'none';
  document.getElementById('sideMenu').style.display=(mode==='3d')?'flex':'none';
  document.getElementById('takasa-field').classList.toggle('hidden',mode==='2d');
  if(mode==='3d'){if(!renderer3)init3D();else build3D();}else draw2D();
};
function draw(){if(currentView==='2d')draw2D();else if(renderer3)build3D();}
function resetDefaults(){
  manualMode=false;linePositions=null;
  document.getElementById('maguchi').value=10000;document.getElementById('okuyuki').value=5200;
  document.getElementById('rensuu').value=4;document.getElementById('pattern').value='U字';
  document.getElementById('ujihaba').value=500;document.getElementById('ujihaba-field').style.display='';
  document.getElementById('hidari').value=250;document.getElementById('migi').value=250;
  document.getElementById('mae').value=200;document.getElementById('ushiro').value=1000;
  document.getElementById('linewidth').value=100;document.getElementById('takasa').value=2000;
  document.getElementById('wallOpacity').value=100;wallOpacity=1.0;
  document.getElementById('wallOpacityVal').textContent='100%';
  draw();
}

// ===== 初期化・イベント =====
var colorRow=document.getElementById('colorRow');
COLOR_HEX.forEach(function(c,i){
  var d=document.createElement('div');
  d.className='color-dot'+(i===0?' sel':'');
  d.style.background=c;
  d.onclick=function(){
    colorRow.querySelectorAll('.color-dot').forEach(function(x){x.classList.remove('sel');});
    d.classList.add('sel');selectedColor=i;
  };
  colorRow.appendChild(d);
});

document.getElementById('wallOpacity').addEventListener('input',function(){
  wallOpacity=this.value/100;
  document.getElementById('wallOpacityVal').textContent=this.value+'%';
  updateWallOpacity();
});

var c3el=document.getElementById('cv3');
c3el.addEventListener('mousedown',function(e){isDrag3=true;lastMX=e.clientX;lastMY=e.clientY;});
window.addEventListener('mouseup',function(){isDrag3=false;});
window.addEventListener('mousemove',function(e){
  if(!isDrag3||currentView!=='3d')return;
  theta-=(e.clientX-lastMX)*0.006;phi-=(e.clientY-lastMY)*0.006;
  phi=Math.max(0.05,Math.min(1.4,phi));
  lastMX=e.clientX;lastMY=e.clientY;updateCam();
});
c3el.addEventListener('wheel',function(e){
  if(currentView!=='3d')return;
  rad+=e.deltaY*0.05;rad=Math.max(3,Math.min(120,rad));updateCam();
});

// 数値入力変更時: 手動モードを解除
['maguchi','okuyuki','ujihaba','hidari','migi','mae','ushiro','linewidth','takasa'].forEach(function(id){
  document.getElementById(id).addEventListener('input',function(){
    if(manualMode){manualMode=false;linePositions=null;}
    draw();
  });
});
document.getElementById('rensuu').addEventListener('change',function(){
  if(manualMode){manualMode=false;linePositions=null;}
  var n=+this.value, lS=gv('hidari'), rS=gv('migi');
  var pat=document.getElementById('pattern').value;
  var eU=(pat==='I字')?gv('linewidth'):gv('ujihaba');
  document.getElementById('maguchi').value=n*2000+eU*(n-1)+lS+rS;draw();
});
document.getElementById('pattern').addEventListener('change',function(){
  if(manualMode){manualMode=false;linePositions=null;}
  document.getElementById('ujihaba-field').style.display=(this.value==='I字')?'none':'';draw();
});

document.getElementById('resetBtn').addEventListener('click',resetDefaults);
document.getElementById('saveBtn').addEventListener('click',function(){
  var id=(currentView==='2d')?'cv':'cv3', cv=document.getElementById(id);
  var a=document.createElement('a');
  a.href=cv.toDataURL('image/png');a.download='parking_plan.png';a.click();
});

window.addEventListener('resize',function(){
  if(currentView==='2d'){draw2D();}
  else if(renderer3){
    var c=document.getElementById('cv3');
    c.width=document.getElementById('cwrap').offsetWidth||860;c.height=500;
    renderer3.setSize(c.width,c.height,false);
    camera.aspect=c.width/c.height;camera.updateProjectionMatrix();
  }
});

setup2DMouse();
setTimeout(function(){draw2D();},80);
})();
</script>
</body>
</html>
